name: Update Blog Manifest

on:
  schedule:
    - cron: '0 8 * * 1' # Weekly, Mondays at 08:00 UTC
  workflow_dispatch: # Allows manual triggering

permissions: write-all

jobs:
  update-blog-manifest:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Regenerate the blog manifest from Blog/*/metadata.json
        run: python generate_blog_manifest.py

      - name: Commit and push changes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add blog-manifest.json
          git commit -m "Auto-update blog manifest" || exit 0
          git push
